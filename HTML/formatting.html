<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatting</title>
</head>
<body>
    <h1>Formatting 1</h1>
    <!-- <h1>Formatting 2</h1> -->
    <h1>Formatting 3</h1> 

    <p>This is <b>Bold</b></p>
    <p>Now in <strong>Strong</strong></p>
    <p>Now in <i>Italic</i></p>
    <p>Now in <em>Emphasize</em></p>
    <p>Now <small>Small</small></p>
    <p>Now in <sub>Subscript</sub></p>
    <p>Now in <sup>Superscript</sup></p>
    <p>Here <del>Delete</del></p>
    <p>Now <mark>Mark</mark></p>

    <h3 style="background-color: aqua; text-align: center;">This tag need some styling</h3>
</body>
</html>
